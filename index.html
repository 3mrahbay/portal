<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Yeni Tasarım — Ana Sayfa Önizleme</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; background:#f0eee9; font-family:"DM Sans", system-ui, sans-serif; }
  * { box-sizing:border-box; }
  .preview-wrap { min-height:100vh; display:flex; flex-direction:column; align-items:center; gap:18px; padding:28px 16px 60px; }
  .preview-title { font-family:"Quicksand"; font-weight:700; color:#1A2E1F; font-size:20px; text-align:center; }
  .preview-sub { color:#5C6F60; font-size:13px; text-align:center; max-width:460px; line-height:1.6; }
  /* Telefon çerçevesi */
  .device { width:390px; height:800px; border-radius:42px; background:#000; padding:8px;
            box-shadow:0 30px 60px rgba(26,46,31,.18), 0 12px 24px rgba(26,46,31,.10); }
  .device-screen { width:100%; height:100%; border-radius:34px; overflow:hidden; background:#fff; position:relative; }
  .device-statusbar { display:flex; justify-content:space-between; align-items:center; padding:12px 22px 4px; font-family:"Quicksand"; font-weight:700; color:#1A2E1F; font-size:13px; }
  .device-scroll { height:calc(100% - 36px); overflow-y:auto; padding:6px 16px 24px; background:#fff; }
  .device-scroll::-webkit-scrollbar { width:0; }

  /* ====== Buraya index.html'deki .cicek-app stilleri birebir kopyalandı ====== */
.cicek-app {
  --c-green:        #3A8E42;
  --c-green-deep:   #1E7A3F;
  --c-green-light:  #4BA651;
  --c-pink-soft:    #FFD4DC;  --c-pink-deep:   #F8A6B4;
  --c-yellow-soft:  #FFF0B0;  --c-yellow-deep: #FFD66B;
  --c-blue-soft:    #CDE7F5;  --c-blue-deep:   #8FC8E5;
  --c-purple-soft:  #E2D7F8;  --c-purple-deep: #B8A0E8;
  --c-peach-soft:   #FFD9C2;  --c-peach-deep:  #F7B591;
  --c-ink:    #1A2E1F;
  --c-body:   #3F5746;
  --c-muted:  #5C6F60;
  --c-surface: #FFFFFF;
  --c-tint:    #FBF9F4;
  --c-border:  #E8EFE9;
  --c-bg:      #F0EEE9;
  --c-radius:  20px;
  --c-radius-sm: 12px;
  --c-shadow:  0 12px 28px rgba(26,46,31,0.10), 0 4px 10px rgba(26,46,31,0.06);
  --c-font-head: "Quicksand", "DM Sans", system-ui, sans-serif;
  --c-font-body: "DM Sans", system-ui, sans-serif;
  font-family: var(--c-font-body); color: var(--c-body);
}
.cicek-app * { box-sizing: border-box; }
.cicek-app h1, .cicek-app h2, .cicek-app h3, .cicek-app .ca-head { font-family: var(--c-font-head); color: var(--c-ink); font-weight: 700; margin: 0; }
.cicek-app .ca-card { background: var(--c-surface); border: 1px solid var(--c-border); border-radius: var(--c-radius); box-shadow: var(--c-shadow); padding: 18px; }
.cicek-app .ca-card.tint { background: var(--c-tint); }
.cicek-app .ca-card-green { background: linear-gradient(135deg, var(--c-green-light), var(--c-green)); color: #fff; border: none; border-radius: var(--c-radius); box-shadow: var(--c-shadow); padding: 18px; }
.cicek-app .ca-card-green h1, .cicek-app .ca-card-green h2, .cicek-app .ca-card-green h3 { color: #fff; }
.cicek-app .ca-pill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 999px; font-size: 12px; font-weight: 600; font-family: var(--c-font-head); color: var(--c-ink); }
.cicek-app .ca-pill.pink { background: var(--c-pink-soft); }
.cicek-app .ca-pill.yellow { background: var(--c-yellow-soft); }
.cicek-app .ca-pill.blue { background: var(--c-blue-soft); }
.cicek-app .ca-pill.purple { background: var(--c-purple-soft); }
.cicek-app .ca-pill.green { background: var(--c-green); color:#fff; }
.cicek-app .ca-tile-sub { font-size: 12px; color: var(--c-muted); }
.cicek-app .ca-btn { font-family: var(--c-font-head); font-weight: 700; font-size: 14px; border: none; border-radius: 14px; padding: 12px 18px; cursor: pointer; background: var(--c-green); color: #fff; transition: filter .15s ease; }
.cicek-app .ca-btn:hover { filter: brightness(1.05); }
.cicek-app .ca-stack { display: flex; flex-direction: column; gap: 14px; }
.cicek-app .ca-row { display: flex; align-items: center; gap: 12px; }
.cicek-app .ca-avatar { width: 56px; height: 56px; border-radius: 50%; background: var(--c-green-light); color:#fff; display: grid; place-items: center; font-size: 22px; font-family: var(--c-font-head); font-weight: 700; flex: none; }
.cicek-app .ca-draft-banner { background: var(--c-yellow-soft); color: #6b5b16; border: 1px dashed var(--c-yellow-deep); border-radius: var(--c-radius-sm); padding: 10px 14px; font-size: 12px; font-weight: 600; margin-bottom: 14px; }
.cicek-app .ca-phone { max-width: 460px; margin: 0 auto; }
.cicek-app .ca-topbar { display:flex; align-items:center; justify-content:space-between; }
.cicek-app .ca-bell { position:relative; width:42px; height:42px; border-radius:14px; border:1px solid var(--c-border); background:var(--c-surface); font-size:18px; cursor:pointer; display:grid; place-items:center; }
.cicek-app .ca-bell-dot { position:absolute; top:9px; right:9px; width:9px; height:9px; border-radius:50%; background:var(--c-pink-deep); border:2px solid var(--c-surface); }
.cicek-app .ca-status { margin-top:14px; background:rgba(255,255,255,.20); color:#fff; border-radius:12px; padding:9px 12px; font-size:12.5px; font-weight:600; }
.cicek-app .ca-sectionhead { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.cicek-app .ca-link { font-family:var(--c-font-head); font-weight:700; font-size:12.5px; color:var(--c-green); background:none; border:none; cursor:pointer; padding:0; }
.cicek-app .ca-quick { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.cicek-app .ca-qbtn { background:none; border:none; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:7px; }
.cicek-app .ca-qicon { width:54px; height:54px; border-radius:18px; display:grid; place-items:center; font-size:22px; transition:transform .15s ease; }
.cicek-app .ca-qbtn:hover .ca-qicon { transform:translateY(-2px); }
.cicek-app .ca-qlabel { font-size:11.5px; color:var(--c-body); font-weight:600; }
.cicek-app .ca-statpills { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:12px; }
.cicek-app .ca-statpill { border-radius:14px; padding:10px 6px; text-align:center; }
.cicek-app .ca-statpill .v { font-family:var(--c-font-head); font-weight:700; color:var(--c-ink); font-size:15px; }
.cicek-app .ca-statpill .l { font-size:10.5px; color:var(--c-muted); margin-top:2px; }
.cicek-app .ca-pay { background:linear-gradient(135deg, var(--c-purple-soft), #EFE7FB); border:none; }
.cicek-app .ca-mini-grid { display:grid; grid-template-columns:1.35fr 1fr; gap:12px; align-items:stretch; }
.cicek-app .ca-announce { color:#fff; border-radius:var(--c-radius); padding:14px; min-height:160px; display:flex; flex-direction:column; justify-content:flex-end; gap:4px; background:linear-gradient(135deg, var(--c-pink-deep), #E86A8A); cursor:pointer; }
.cicek-app .ca-thumb { aspect-ratio:16/9; border-radius:var(--c-radius-sm); position:relative; overflow:hidden; background:repeating-linear-gradient(45deg, var(--c-pink-soft), var(--c-pink-soft) 12px, #ffe2e8 12px, #ffe2e8 24px); }
.cicek-app .ca-msgitem { display:flex; align-items:center; gap:10px; padding:9px 0; border-top:1px solid var(--c-border); }
.cicek-app .ca-msgitem:first-child { border-top:none; }
.cicek-app .ca-msgmini { width:36px; height:36px; border-radius:50%; display:grid; place-items:center; font-family:var(--c-font-head); font-weight:700; font-size:14px; color:var(--c-ink); flex:none; }
.cicek-app .ca-unread { margin-left:auto; min-width:20px; height:20px; padding:0 6px; border-radius:10px; background:var(--c-green); color:#fff; font-size:11px; font-weight:700; display:grid; place-items:center; flex:none; }
.cicek-app .ca-edurow { display:flex; align-items:center; gap:10px; margin:9px 0; }
.cicek-app .ca-edurow .lbl { font-size:12.5px; color:var(--c-body); width:74px; flex:none; }
.cicek-app .ca-edurow .track { flex:1; height:8px; border-radius:6px; background:var(--c-border); overflow:hidden; }
.cicek-app .ca-edurow .fill { height:100%; border-radius:6px; }
.cicek-app .ca-edurow .pct { font-family:var(--c-font-head); font-weight:700; font-size:12.5px; color:var(--c-ink); width:34px; text-align:right; flex:none; }
</style>
</head>
<body>
<div class="preview-wrap">
  <div class="preview-title">✨ Yeni Tasarım — Ana Sayfa Önizleme</div>
  <div class="preview-sub">Bu, portaldaki yeni "Yeni Tasarım" sekmesinin ana sayfasının statik önizlemesidir. Firebase girişi gerekmez. Kutucuklara tıklayınca hangi sekmeye gideceğini gösterir.</div>

  <div class="device">
    <div class="device-screen">
      <div class="device-statusbar"><span>9:41</span><span>📶 🔋</span></div>
      <div class="device-scroll">
        <div class="cicek-app" id="cicekAppRoot"></div>
      </div>
    </div>
  </div>
</div>

<script>
  // Standalone önizlemede portal fonksiyonu yok — tıklamaları gösterelim
  function veliSwitchTab(t){
    const adlar = { okul:'Okul Hayatı / Menü', raporlar:'Gelişim Raporları', galeri:'Galeri', odemeler:'Ödemeler', iletisim:'Mesajlar', bildirimler:'Bildirimler' };
    alert('Portal sekmesine gider: ' + (adlar[t] || t));
  }

  document.getElementById("cicekAppRoot").innerHTML = `
    <div class="ca-phone ca-stack">
      <div class="ca-draft-banner">
        ✨ Pilot / taslak — Veriler şimdilik örnek; canlıda Firebase verisine bağlanacak.
      </div>

      <div class="ca-topbar">
        <div class="ca-row">
          <div class="ca-avatar" style="background:var(--c-pink-soft); color:var(--c-ink);">A</div>
          <div>
            <div class="ca-tile-sub">Günaydın</div>
            <h2 style="font-size:18px;">Ayşe Hanım 🌿</h2>
          </div>
        </div>
        <button class="ca-bell" onclick="veliSwitchTab('bildirimler')" title="Bildirimler">🔔<span class="ca-bell-dot"></span></button>
      </div>

      <div class="ca-card-green">
        <div class="ca-row" style="justify-content:space-between;">
          <div class="ca-row">
            <div class="ca-avatar" style="background:#fff; color:var(--c-green);">D</div>
            <div>
              <div style="font-size:11px; letter-spacing:.08em; opacity:.85;">ÇOCUĞUM</div>
              <h2 style="font-size:19px;">Defne Demir</h2>
              <div style="font-size:12px; opacity:.9; margin-top:2px;">Papatya Sınıfı · 5 yaş</div>
            </div>
          </div>
          <span style="opacity:.85; font-size:18px;">⌄</span>
        </div>
        <div class="ca-status">🟢 Bugün okulda · 09:12'de giriş yaptı</div>
      </div>

      <div>
        <h3 class="ca-head" style="font-size:15px; margin-bottom:10px;">Hızlı işlemler</h3>
        <div class="ca-quick">
          <button class="ca-qbtn" onclick="veliSwitchTab('okul')"><span class="ca-qicon" style="background:var(--c-pink-soft);">🍽️</span><span class="ca-qlabel">Menü</span></button>
          <button class="ca-qbtn" onclick="veliSwitchTab('raporlar')"><span class="ca-qicon" style="background:var(--c-yellow-soft);">📊</span><span class="ca-qlabel">Gelişim</span></button>
          <button class="ca-qbtn" onclick="veliSwitchTab('galeri')"><span class="ca-qicon" style="background:var(--c-blue-soft);">📷</span><span class="ca-qlabel">Galeri</span></button>
          <button class="ca-qbtn" onclick="veliSwitchTab('odemeler')"><span class="ca-qicon" style="background:var(--c-purple-soft);">💳</span><span class="ca-qlabel">Ödeme</span></button>
        </div>
      </div>

      <div class="ca-card ca-pay">
        <div class="ca-row" style="justify-content:space-between;">
          <span class="ca-pill" style="background:var(--c-purple-deep); color:#fff;">💳 Bu ay ödemesi</span>
          <span class="ca-pill" style="background:#fff; color:var(--c-purple-deep);">Bekliyor</span>
        </div>
        <div class="ca-row" style="justify-content:space-between; margin-top:12px; align-items:flex-end;">
          <div>
            <div class="ca-head" style="font-size:22px;">₺4.500</div>
            <div class="ca-tile-sub">Nisan 2026 · Son ödeme 25 Nisan</div>
          </div>
          <button class="ca-btn" style="background:var(--c-purple-deep);" onclick="veliSwitchTab('odemeler')">Ödeme Bildir</button>
        </div>
      </div>

      <div>
        <div class="ca-sectionhead">
          <h3 class="ca-head" style="font-size:15px;">Bugünün günlüğü</h3>
          <button class="ca-link" onclick="veliSwitchTab('raporlar')">Tümü →</button>
        </div>
        <div class="ca-card">
          <div class="ca-row">
            <span class="ca-qicon" style="background:var(--c-yellow-soft); width:42px; height:42px; font-size:18px;">☀️</span>
            <div>
              <div style="font-weight:700; color:var(--c-ink);">Çarşamba, 22 Nisan</div>
              <div class="ca-tile-sub">Öğretmen: Esra Yıldırım</div>
            </div>
          </div>
          <div class="ca-statpills">
            <div class="ca-statpill" style="background:var(--c-pink-soft);"><div class="v">%85</div><div class="l">Yemek</div></div>
            <div class="ca-statpill" style="background:var(--c-purple-soft);"><div class="v">1s 20dk</div><div class="l">Uyku</div></div>
            <div class="ca-statpill" style="background:#Dff4e3;"><div class="v">Mutlu</div><div class="l">Mood</div></div>
          </div>
          <div style="margin-top:12px; font-size:13.5px; color:var(--c-body); line-height:1.6;">
            Bugün bahçede yapraklarla matematik etkinliği yaptık. Defne çok ilgiliydi ve arkadaşlarına da yardım etti 🌿
          </div>
        </div>
      </div>

      <div class="ca-mini-grid">
        <div class="ca-announce" onclick="veliSwitchTab('bildirimler')">
          <span class="ca-pill" style="background:rgba(255,255,255,.25); color:#fff; align-self:flex-start;">⭐ Özel Etkinlik</span>
          <div style="flex:1;"></div>
          <div style="font-family:var(--c-font-head); font-weight:700; font-size:17px;">23 Nisan Çocuk Şenliği</div>
          <div style="font-size:12px; opacity:.92;">Yarın · 10:00 — 14:00 · Bahçe</div>
        </div>
        <div class="ca-card" style="padding:12px;">
          <div class="ca-sectionhead" style="margin-bottom:4px;">
            <span class="ca-head" style="font-size:13px;">Mesajlar</span>
            <button class="ca-link" onclick="veliSwitchTab('iletisim')" style="font-size:11px;">→</button>
          </div>
          <div class="ca-msgitem">
            <div class="ca-msgmini" style="background:var(--c-green-light); color:#fff;">E</div>
            <div style="min-width:0;">
              <div style="font-weight:600; color:var(--c-ink); font-size:12.5px;">Esra Öğretmen</div>
              <div class="ca-tile-sub" style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Defne bugün çok keyifliydi 🌸</div>
            </div>
            <span class="ca-unread">2</span>
          </div>
          <div class="ca-msgitem">
            <div class="ca-msgmini" style="background:var(--c-yellow-soft);">P</div>
            <div style="min-width:0;">
              <div style="font-weight:600; color:var(--c-ink); font-size:12.5px;">Papatya Sınıfı</div>
              <div class="ca-tile-sub" style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">23 Nisan için kostüm…</div>
            </div>
            <span class="ca-unread">5</span>
          </div>
        </div>
      </div>

      <div>
        <div class="ca-sectionhead">
          <h3 class="ca-head" style="font-size:15px;">Anılarımız</h3>
          <button class="ca-link" onclick="veliSwitchTab('galeri')">Tümü →</button>
        </div>
        <div class="ca-card" style="padding:12px; cursor:pointer;" onclick="veliSwitchTab('galeri')">
          <div class="ca-thumb">
            <span class="ca-pill pink" style="position:absolute; top:8px; left:8px;">🆕 Yeni · 8 fotoğraf</span>
          </div>
          <div style="margin-top:10px;" class="ca-row">
            <span style="font-weight:700; color:var(--c-ink); font-size:13.5px;">Bahçe Etkinliği</span>
            <span class="ca-tile-sub" style="margin-left:auto;">22 Nisan · Papatya Sınıfı</span>
          </div>
        </div>
      </div>

      <div>
        <div class="ca-sectionhead">
          <h3 class="ca-head" style="font-size:15px;">Eğitim Gelişimi</h3>
          <button class="ca-link" onclick="veliSwitchTab('raporlar')">Detay →</button>
        </div>
        <div class="ca-card">
          <div class="ca-edurow"><span class="lbl">Sosyal</span><span class="track"><span class="fill" style="width:90%; background:var(--c-green-light);"></span></span><span class="pct">90</span></div>
          <div class="ca-edurow"><span class="lbl">Dil</span><span class="track"><span class="fill" style="width:85%; background:var(--c-yellow-deep);"></span></span><span class="pct">85</span></div>
          <div class="ca-edurow"><span class="lbl">Motor</span><span class="track"><span class="fill" style="width:78%; background:var(--c-blue-deep);"></span></span><span class="pct">78</span></div>
          <div class="ca-edurow"><span class="lbl">Bilişsel</span><span class="track"><span class="fill" style="width:82%; background:var(--c-purple-deep);"></span></span><span class="pct">82</span></div>
          <div class="ca-card tint" style="margin-top:12px; padding:12px; display:flex; align-items:center; gap:10px; cursor:pointer;" onclick="veliSwitchTab('raporlar')">
            <span style="font-size:20px;">📄</span>
            <div>
              <div style="font-weight:700; color:var(--c-ink); font-size:13px;">Nisan ayı gelişim raporu hazır</div>
              <div class="ca-tile-sub">Montessori · Orman · İngilizce · Değerler</div>
            </div>
            <span class="ca-link" style="margin-left:auto;">Aç →</span>
          </div>
        </div>
      </div>

    </div>
  `;
</script>
</body>
</html>
